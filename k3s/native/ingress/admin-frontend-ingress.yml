---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-frontend-ingress
  namespace: appflowy
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
    cert-manager.io/common-name: AppFlowy Cloud
    # Proxy settings for admin frontend
    nginx.ingress.kubernetes.io/proxy-body-size: "10M"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-cache: "off"
    # Headers
    nginx.ingress.kubernetes.io/enable-underscores-in-headers: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - 'appflowy-admin.m1c1b.home'
      secretName: appflowy-tls
  rules:
    - host: appflowy-admin.m1c1b.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-frontend
                port:
                  number: 3000
