---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gotrue-ingress
  namespace: appflowy
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
    cert-manager.io/common-name: AppFlowy Cloud
    # Rewrite rules for gotrue - remove /gotrue prefix
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "10M"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Headers
    nginx.ingress.kubernetes.io/enable-underscores-in-headers: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - 'appflowy.m1c1b.home'
      secretName: appflowy-tls
  rules:
    - host: appflowy.m1c1b.home
      http:
        paths:
          # GoTrue Authentication - rewrite /gotrue to /
          - path: /gotrue(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: gotrue
                port:
                  number: 9999
