---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lidarr
  namespace: lidarr
  labels:
    app: lidarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lidarr
  template:
    metadata:
      labels:
        app: lidarr
    spec:
      securityContext:
        runAsUser: 0
        fsGroup: 1000
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /mnt/media"]
          volumeMounts:
            - name: media
              mountPath: /mnt/media
      containers:
        - name: lidarr
          image: lscr.io/linuxserver/lidarr:latest
          ports:
            - containerPort: 8686
              name: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /mnt/media
#          livenessProbe:
#            httpGet:
#              path: /api/v3/system/status
#              port: 8686
#              httpHeaders:
#                - name: X-Api-Key
#                  value: "3ead64faf4234a43b3bb46ca2a15244b"
#            initialDelaySeconds: 30
#            periodSeconds: 10
#            timeoutSeconds: 5
#            failureThreshold: 3
#          readinessProbe:
#            httpGet:
#              path: /api/v3/system/status
#              port: 8686
#              httpHeaders:
#                - name: X-Api-Key
#                  value: "3ead64faf4234a43b3bb46ca2a15244b"
#            initialDelaySeconds: 15
#            periodSeconds: 5
#            timeoutSeconds: 5
#            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          hostPath:
            path: /SSD/app-data/lidarr
            type: DirectoryOrCreate
        - name: media
          hostPath:
            path: /DATA/media
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: lidarr
  namespace: lidarr
  labels:
    app: lidarr
spec:
  selector:
    app: lidarr
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 80
      name: webui
      targetPort: 8686
