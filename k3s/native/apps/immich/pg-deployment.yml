---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: immich
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsUser: 0
        fsGroup: 999
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: [ "sh", "-c", "chown -R 999:999 /var/lib/postgresql/data && chmod 0700 /var/lib/postgresql/data" ]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: ghcr.io/tensorchord/vchord-postgres:pg15-v0.4.3
          imagePullPolicy: "IfNotPresent"
          ports:
            - containerPort: 5432
              name: main
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: elephants_are_very_smart
            - name: POSTGRES_DB
              value: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          hostPath:
            path: /DATA/app-data/immich/pg-data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: immich
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: main
  selector:
    app: postgres
---