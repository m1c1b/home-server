---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      securityContext:
        runAsUser: 0
        fsGroup: 1000
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:0.9.6
          imagePullPolicy: "IfNotPresent"
          ports:
            - containerPort: 8080
              name: http
          env:
            # Отключаем встроенный Ollama, используем внешний API при необходимости
            - name: OLLAMA_BASE_URL
              value: ""
            - name: WEBUI_AUTH
              value: "True"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          hostPath:
            path: /SSD/app-data/open-webui
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: open-webui
  labels:
    app: open-webui
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
  selector:
    app: open-webui
