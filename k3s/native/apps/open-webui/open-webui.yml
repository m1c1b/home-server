---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      securityContext:
        runAsUser: 0
        fsGroup: 1000
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:0.10.1
          imagePullPolicy: "IfNotPresent"
          ports:
            - containerPort: 8080
              name: http
          env:
            # Отключаем встроенный Ollama, используем внешний API при необходимости
            - name: OLLAMA_BASE_URL
              value: ""
            - name: WEBUI_AUTH
              value: "True"
            # Веб-поиск через собственный SearXNG (namespace searxng, cluster-DNS)
            - name: ENABLE_RAG_WEB_SEARCH
              value: "True"
            - name: ENABLE_WEB_SEARCH
              value: "True"
            - name: WEB_SEARCH_ENGINE
              value: "searxng"
            - name: SEARXNG_QUERY_URL
              value: "http://searxng.searxng.svc.cluster.local:8080/search?q=<query>"
            # Дефолтная embedding-модель (all-MiniLM, англ.) плохо ранжирует
            # русские чанки → "Источники не найдены". Для веб-поиска отключаем
            # эмбеддинги/retrieval и отдаём LLM весь текст страниц напрямую.
            - name: BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL
              value: "True"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          hostPath:
            path: /SSD/app-data/open-webui
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: open-webui
  labels:
    app: open-webui
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
  selector:
    app: open-webui
