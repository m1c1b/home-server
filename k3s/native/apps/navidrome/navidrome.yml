---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  namespace: navidrome
  labels:
    app: navidrome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: navidrome
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: navidrome
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: navidrome
          image: deluan/navidrome:latest
          ports:
            - containerPort: 4533
          env:
            - name: ND_MUSICFOLDER
              value: "/music"
            - name: ND_DATAFOLDER
              value: "/data"
            - name: ND_LOGLEVEL
              value: "info"
            # Раскомментируйте, если нужно изменить порт внутри контейнера (по умолчанию 4533)
            # - name: ND_PORT
            #   value: "4533"
          volumeMounts:
            - name: data-volume
              mountPath: "/data"
            # Рекомендуется монтировать музыку только для чтения, если не нужно сканирование тегов с записью
            - name: music-volume
              mountPath: "/music"
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: data-volume
          hostPath:
            path: /SSD/app-data/navidrome
            type: DirectoryOrCreate
        - name: music-volume
          hostPath:
            path: /DATA/media/music/navidrome
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: navidrome-service
  namespace: navidrome
spec:
  selector:
    app: navidrome
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4533
  type: ClusterIP