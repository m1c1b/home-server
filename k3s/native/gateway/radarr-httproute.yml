---
# Миграция radarr с Ingress на Gateway API HTTPRoute.
# Эквивалент k3s/native/ingress/media/radarr-ingress.yml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: radarr
  namespace: radarr
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
  hostnames:
    - "radarr.m1c1b.home"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: radarr
          port: 80
