---
# Миграция bazarr с Ingress на Gateway API HTTPRoute.
# Эквивалент k3s/native/ingress/media/bazarr-ingress.yml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bazarr
  namespace: bazarr
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
  hostnames:
    - "bazarr.m1c1b.home"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: bazarr
          port: 80
