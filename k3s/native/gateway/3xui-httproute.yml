---
# Миграция 3x-ui с Ingress на Gateway API HTTPRoute.
# Эквивалент k3s/native/ingress/3xui-ingress.yml. TLS: см. https-3x-ui listener в gateway.yml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: 3x-ui
  namespace: 3x-ui
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https-3x-ui
  hostnames:
    - "x3-ui.m1c1b.home"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: x3-ui
          port: 80
