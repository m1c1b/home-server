---
# Миграция immich с Ingress на Gateway API HTTPRoute.
# Эквивалент k3s/native/ingress/immich-ingress.yml (внутренний + внешний tuna-tunnel хост).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich
  namespace: immich
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
  hostnames:
    - "immich.m1c1b.home"
    - "photos-zxc.ru.tuna.am"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: immich-server
          port: 2283
---
# Эквивалент nginx.ingress.kubernetes.io/proxy-body-size: 40g - большие загрузки фото/видео.
apiVersion: gateway.nginx.org/v1alpha1
kind: ClientSettingsPolicy
metadata:
  name: immich-body-size
  namespace: immich
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: immich
  body:
    maxSize: 40g
