---
# Миграция open-webui с Ingress на Gateway API HTTPRoute.
# Эквивалент k3s/native/ingress/open-webui.yml (внутренний + внешний tuna-tunnel хост).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: open-webui
  namespace: open-webui
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
  hostnames:
    - "ai.m1c1b.home"
    - "ai-zxc.ru.tuna.am"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: open-webui
          port: 80
