---
# Миграция jellyseerr (seerr) с Ingress на Gateway API HTTPRoute.
# Эквивалент Helm-managed Ingress "jellyseerr-seerr-chart" в чарте seerr-chart.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seerr
  namespace: seerr
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
  hostnames:
    - "seerr.m1c1b.home"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: jellyseerr-seerr-chart
          port: 80
