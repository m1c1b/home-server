---
# Миграция navidrome с Ingress на Gateway API HTTPRoute.
# Эквивалент k3s/native/ingress/navidrome.yml (внутренний + внешний tuna-tunnel хост).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: navidrome
  namespace: navidrome
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
  hostnames:
    - "music.m1c1b.home"
    - "music-zxc.ru.tuna.am"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: navidrome-service
          port: 80
