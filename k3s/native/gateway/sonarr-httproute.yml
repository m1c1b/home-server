---
# Pilot-миграция sonarr с Ingress на Gateway API HTTPRoute.
# Эквивалент существующего k3s/native/ingress/media/sonarr-ingress.yml.
# proxy-body-size: 100m не перенесён - для простого проксирования UI без загрузок
# большого размера не требуется; при необходимости добавить ClientSettingsPolicy.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sonarr
  namespace: sonarr
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
  hostnames:
    - "sonarr.m1c1b.home"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: sonarr
          port: 80
