---
# Миграция prowlarr с Ingress на Gateway API HTTPRoute.
# Эквивалент k3s/native/ingress/media/prowlarr-ingress.yml. TLS: см. https-prowlarr listener в gateway.yml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prowlarr
  namespace: prowlarr
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https-prowlarr
  hostnames:
    - "prowlarr.m1c1b.home"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: prowlarr
          port: 80
