---
# Миграция qbittorrent с Ingress на Gateway API HTTPRoute.
# Эквивалент k3s/native/ingress/media/qbittorrent-ingress.yml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent
  namespace: qbittorrent
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
  hostnames:
    - "qbt.m1c1b.home"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: qbittorrent
          port: 80
