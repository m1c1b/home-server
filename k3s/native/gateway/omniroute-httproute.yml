---
# Миграция omniroute с Ingress на Gateway API HTTPRoute.
# Эквивалент k3s/native/ingress/omniroute.yml (внутренний + внешний tuna-tunnel хост).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: omniroute
  namespace: omniroute
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
  hostnames:
    - "omniroute.m1c1b.home"
    - "omniroute-zxc.ru.tuna.am"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: omniroute
          port: 80
