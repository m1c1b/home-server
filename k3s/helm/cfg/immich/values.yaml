## This chart relies on the common library chart from bjw-s
## You can find it at https://github.com/bjw-s-labs/helm-charts/tree/common-5.0.1/charts/library/common
## Refer there for more detail about the supported values

# Top-level keys (controllers) применяются ко ВСЕМ компонентам Immich (server, machine-learning).
# Компонентные блоки ниже (server:, machine-learning:) переопределяют/дополняют образы и env.

controllers:
  main:
    containers:
      main:
        image:
          # Версия Immich. Чарт НЕ обновляется вместе с каждым релизом Immich — задаём тег явно.
          tag: v3.0.3
        env:
          # Внешняя БД (отдельный манифест k3s/native/apps/immich/pg-deployment.yml, НЕ helm-сабчарт).
          # Immich подключается под отдельной ролью immich/immich (НЕ суперюзером postgres);
          # суперюзер postgres/elephants_are_very_smart используется только для initdb.
          DB_HOSTNAME: "postgres.immich.svc.cluster.local"
          DB_USERNAME: "immich"
          DB_DATABASE_NAME: "immich"
          DB_PASSWORD: "immich"
          DB_VECTOR_EXTENSION: "vectorchord"
          # Очередь задач — встроенный valkey-сабчарт (заменил bitnami redis)
          REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
          IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'

immich:
  metrics:
    # Enabling this will create the service monitors needed to monitor immich with the prometheus operator
    enabled: false
  persistence:
    # Main data store for all photos shared between different components.
    library:
      # Automatically creating the library volume is not supported by this chart
      # You have to specify an existing PVC to use
      existingClaim: "immich-data-claim"
  # configuration is immich-config.json converted to yaml
  # ref: https://immich.app/docs/install/config-file/
  #
  configuration:
    passwordLogin:
      enabled: true

    server:
      externalDomain: ""
      loginPageMessage: "Привет!"

    trash:
      enabled: true
      days: 30

    storageTemplate:
      enabled: true
      template: "{{y}}/{{MM}}/{{dd}}/{{filename}}"

    backup:
      database:
        enabled: true
        cronExpression: "0 02 * * *"
        keepLastAmount: 14

# Dependencies

# Очередь задач. valkey заменил устаревший redis-сабчарт в chart >= 0.13.
# Хранение эфемерное (emptyDir) — при рестарте очередь сбрасывается, это допустимо.
valkey:
  enabled: true

# Immich components

server:
  enabled: true
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/immich-server
            pullPolicy: IfNotPresent
  ingress:
    main:
      enabled: false
      annotations:
        # proxy-body-size is set to 0 to remove the body limit on file uploads
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
      hosts:
        - host: immich.local
          paths:
            - path: "/"
              service:
                identifier: main
      tls: []

machine-learning:
  enabled: true
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/immich-machine-learning
            pullPolicy: IfNotPresent
          env:
            TRANSFORMERS_CACHE: /cache
  persistence:
    cache:
      enabled: true
      type: persistentVolumeClaim
      # Переиспользуем существующий PVC, чтобы не перекачивать ML-модели при старте
      existingClaim: "immich-machine-learning-cache"
